      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -14; 0 0" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.18;0.5;0.18" dur="2.4s" repeatCount="indefinite"/>
    </path>
    <path d="M260,445 C268,418 278,418 286,445 C294,472 304,472 312,445 C320,418 330,418 338,445"
          fill="none" stroke="#fff0b0" stroke-width="6" stroke-linecap="round">
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -18; 0 0" dur="2.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.14;0.46;0.14" dur="2.1s" repeatCount="indefinite"/>
    </path>
    <path d="M420,430 C428,402 438,402 446,430 C454,458 464,458 472,430 C480,402 490,402 498,430"
          fill="none" stroke="#fff7cf" stroke-width="5" stroke-linecap="round">
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -16; 0 0" dur="2.7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.15;0.48;0.15" dur="2.7s" repeatCount="indefinite"/>
    </path>
    <path d="M610,448 C618,422 628,422 636,448 C644,474 654,474 662,448 C670,422 680,422 688,448"
          fill="none" stroke="#fff0b8" stroke-width="6" stroke-linecap="round">
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -15; 0 0" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.12;0.42;0.12" dur="2.2s" repeatCount="indefinite"/>
    </path>
  </g>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M-40,360 C120,320 220,395 360,350 C500,305 620,390 840,335"
          stroke="#fff4c7" stroke-width="7" opacity="0.28" stroke-dasharray="28 22">
      <animate attributeName="stroke-dashoffset" values="0;-100" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.12;0.32;0.12" dur="2.8s" repeatCount="indefinite"/>
    </path>
    <path d="M-60,390 C100,350 225,430 390,382 C540,340 660,418 860,372"
          stroke="#ffe9a8" stroke-width="6" opacity="0.25" stroke-dasharray="22 20">
      <animate attributeName="stroke-dashoffset" values="0;-120" dur="3.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.1;0.3;0.1" dur="2.4s" repeatCount="indefinite"/>
    </path>
    <path d="M-50,430 C130,395 260,462 430,420 C565,387 670,455 850,418"
          stroke="#fff7db" stroke-width="5" opacity="0.2" stroke-dasharray="18 18">
