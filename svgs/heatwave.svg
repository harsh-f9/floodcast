      <animate attributeName="opacity" values="0.08;0.24;0.08" dur="2.2s" repeatCount="indefinite"/>
    </path>
  </g>

  <g opacity="0.18">
    <rect x="0" y="300" width="800" height="160" fill="#ffffff">
      <animate attributeName="opacity" values="0.05;0.12;0.05" dur="2.6s" repeatCount="indefinite"/>
    </rect>
  </g>

  <g opacity="0.22">
    <path d="M0,350 C90,340 160,370 240,350 C330,328 430,372 520,350 C620,325 710,360 800,346"
          fill="none" stroke="#fff6dc" stroke-width="14" filter="url(#blurSoft)">
      <animate attributeName="d"
        dur="4.2s"
        repeatCount="indefinite"
        values="
        M0,350 C90,340 160,370 240,350 C330,328 430,372 520,350 C620,325 710,360 800,346;
        M0,356 C90,332 160,378 240,356 C330,334 430,364 520,356 C620,332 710,352 800,352;
        M0,350 C90,340 160,370 240,350 C330,328 430,372 520,350 C620,325 710,360 800,346"/>
    </path>
  </g>
